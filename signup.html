<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="icon" href="assets/logo.png">
        <link rel="stylesheet" href="css/bootstrap.min.css">
        <link rel="stylesheet" href="css/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    </head>
    <body>
        <main>
            <div class="container d-flex justify-content-center align-items-center">
                <div class="box w-75 p-5 mt-5 text-center">
                    <h1 class="mb-4">Smart Login System</h1>
                    <div class="mb-4">
                        <input type="text" id="inputName" class="form-control" placeholder="Enter Your Name">
                    </div>
                    <div class="mb-4">
                        <input type="email" id="inputEmail" class="form-control" placeholder="Enter Your Email">
                    </div>
                    <div class="mb-4">
                        <input type="password" id="inputPassword" class="form-control" placeholder="Enter Your Password">
                    </div>
                    <p class="text-danger d-none" id="message">All inputs is required</p>
                    <button class="btn" onclick="signup()">Sign Up</button>
                    <p class="text-white">You have an account? <a href="index.html" class="text-white text-decoration-none">Login</a></p>
                </div>
            </div>
        </main>
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/main.js"></script>
    </body>
</html>
